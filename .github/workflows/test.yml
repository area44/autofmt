name: Test Action

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  test-action:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Ensure we check out the head branch in PRs so we can push back to it
          ref: ${{ github.head_ref || github.ref }}

      - name: Run autofmt
        uses: ./
        with:
          rules: |
            {
              "semi": true,
              "singleQuote": true
            }
