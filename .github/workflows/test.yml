name: Test Action

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run autofmt
        uses: ./
        with:
          rules: |
            {
              "semi": true,
              "singleQuote": true
            }
