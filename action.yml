name: 'autofmt'
description: 'Fast JavaScript/TypeScript formatting using the Oxc formatter'
author: 'AREA44'
inputs:
  rules:
    description: 'JSON string of formatting rules (no need for a config file in your repo)'
    required: false
  ignore:
    description: 'Multiline string of patterns to ignore (no need for an ignore file in your repo)'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install oxfmt
      run: npm install -g oxfmt
      shell: bash

    - name: Prepare configuration
      env:
        RULES: ${{ inputs.rules }}
        IGNORE: ${{ inputs.ignore }}
      run: |
        CONFIG="{}"
        if [ -n "$RULES" ]; then
          CONFIG="$RULES"
        fi

        if [ -n "$IGNORE" ]; then
          IGNORE_JSON=$(echo "$IGNORE" | grep -v '^$' | jq -R . | jq -s .)
          CONFIG=$(echo "$CONFIG" | jq --argjson ignores "$IGNORE_JSON" '.ignorePatterns = $ignores')
        fi

        if [ "$CONFIG" != "{}" ]; then
          echo "$CONFIG" > .oxfmtrc.json
          echo "Created temporary .oxfmtrc.json"
        fi
      shell: bash

    - name: Run oxfmt
      run: |
        # oxfmt automatically searches for .oxfmtrc.json in the current directory
        oxfmt --write .
      shell: bash

    - name: Check for changes and push
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        # Clean up temporary files before checking for changes
        rm -f .oxfmtrc.json

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # In a PR, we need to push to the head branch, not the merge ref.
        # If GITHUB_HEAD_REF is set, we use it. Otherwise, we use the current branch.
        PUSH_REF="HEAD"
        if [ -n "$GITHUB_HEAD_REF" ]; then
          PUSH_REF="HEAD:$GITHUB_HEAD_REF"
        fi

        git add .
        if ! git diff --cached --quiet; then
          echo "Changes detected, committing and pushing to $PUSH_REF..."
          git commit -m "style: format code with oxfmt [skip ci]"
          git push origin $PUSH_REF
        else
          echo "No changes detected."
        fi
      shell: bash
