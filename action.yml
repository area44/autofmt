name: 'autofmt'
description: 'Fast JavaScript/TypeScript formatting using the Oxc formatter'
author: 'AREA44'
inputs:
  config:
    description: 'Path to the configuration file'
    required: false
  ignore:
    description: 'Path to ignore file(s)'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install oxfmt
      run: npm install -g oxfmt
      shell: bash

    - name: Run oxfmt
      env:
        CONFIG_PATH: ${{ inputs.config }}
        IGNORE_PATH: ${{ inputs.ignore }}
      run: |
        declare -a ARGS=("--write")
        if [ -n "$CONFIG_PATH" ]; then
          ARGS+=("--config" "$CONFIG_PATH")
        fi
        if [ -n "$IGNORE_PATH" ]; then
          for path in $IGNORE_PATH; do
            ARGS+=("--ignore-path" "$path")
          done
        fi
        oxfmt "${ARGS[@]}" .
      shell: bash

    - name: Check for changes and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if ! git diff --cached --quiet; then
          echo "Changes detected, committing and pushing..."
          git commit -m "style: format code with oxfmt"
          git push
        else
          echo "No changes detected."
        fi
      shell: bash
