name: "autofmt"
description: "Fast JavaScript/TypeScript formatting using the Oxc formatter"
author: "AREA44"
inputs:
  rules:
    description: "JSON string of formatting rules"
    required: false
  ignore:
    description: "Multiline string of patterns to ignore"
    required: false
runs:
  using: "composite"
  steps:
    - name: Install oxfmt
      run: npm install -g oxfmt
      shell: bash

    - name: Prepare configuration
      env:
        RULES: ${{ inputs.rules }}
        IGNORE: ${{ inputs.ignore }}
      run: |
        # Default configuration
        DEFAULT_CONFIG='{
          "ignorePatterns": [
            "*.min.*",
            "*.map",
            "**/public",
            "**/build",
            "**/dist",
            "**/out",
            "**/.github",
            "**/.next",
            "**/.astro",
            "**/.netlify",
            "**/*.gen.*"
          ],
          "sortImports": {
            "groups": [
              "type-import",
              ["value-builtin", "value-external"],
              "type-internal",
              "value-internal",
              ["type-parent", "type-sibling", "type-index"],
              ["value-parent", "value-sibling", "value-index"],
              "unknown"
            ]
          }
        }'

        CONFIG="$DEFAULT_CONFIG"


        # Merge user rules if provided (user rules take precedence)
        if [ -n "$RULES" ]; then
          CONFIG=$(echo "$CONFIG" | jq --argjson rules "$RULES" '. * $rules')
        fi

        # Append user ignore patterns if provided
        if [ -n "$IGNORE" ]; then
          IGNORE_ARRAY=$(echo "$IGNORE" | grep -v '^$' | jq -R . | jq -s .)
          CONFIG=$(echo "$CONFIG" | jq --argjson ignores "$IGNORE_ARRAY" '.ignorePatterns += $ignores')
        fi

        echo "$CONFIG" > .oxfmtrc.json
        echo "Created temporary .oxfmtrc.json"
      shell: bash

    - name: Run oxfmt
      run: |
        oxfmt --write .
      shell: bash

    - name: Check for changes and push
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        rm -f .oxfmtrc.json

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        PUSH_REF="HEAD"
        if [ -n "$GITHUB_HEAD_REF" ]; then
          PUSH_REF="HEAD:$GITHUB_HEAD_REF"
        fi

        git add .
        if ! git diff --cached --quiet; then
          echo "Changes detected, committing and pushing to $PUSH_REF..."
          git commit -m "style: format code with oxfmt [skip ci]"
          git push origin $PUSH_REF
        else
          echo "No changes detected."
        fi
      shell: bash
